<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles/output.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | QR code component</title>
  </head>
  <body class="min-h-screen flex flex-col">
    <div class="flex-1 flex justify-center items-center">
      <div class="bg-surface rounded-2xl m-8 p-4 w-md">
        <img
          src="./images/image-qr-code.png"
          alt="QR Code Image"
          class="rounded-2xl"
        />
        <h1 class="text-2xl text-center m-6 font-bold">Improve your front-end skills by building projects</h1>
        <p class="text-muted text-lg text-center m-6">
          Scan the QR code to visit Frontend Mentor and take your coding skills
          to the next level
        </p>
      </div>
    </div>
    <footer class="text-[0.6875rem] text-center p-4">
      Challenge by
      <a
        href="https://www.frontendmentor.io?ref=challenge"
        class="text-[hsl(228,45%,44%)]"
        >Frontend Mentor</a
      >. Coded by
      <a href="#" class="text-[hsl(228,45%,44%)]">Benzzo Krugger</a>.
    </footer>
  </body>
</html>
